<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Ícone temporário do PWA Lurd's Order One.
    Substituir por logo real depois — gerar PNGs 192/512/maskable via
    https://realfavicongenerator.net usando o logo oficial Lurd's.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Texto "L1" estilizado, mesma identidade do header -->
  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="280"
    font-weight="600"
    font-style="italic"
    fill="#ffffff"
  >L<tspan dx="-20" dy="-30" font-size="180" font-style="normal">1</tspan></text>
</svg>
